<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>王子成 | 学术简历</title>
    <meta name="description" content="王子成的学术简历在线预览与 PDF 下载。">
    <style>
      :root {
        color-scheme: light;
        --ink: #18212f;
        --muted: #667085;
        --line: #d7e2ec;
        --brand: #006cb7;
        --brand-dark: #064f86;
        --paper: #ffffff;
        --wash: #f4f8fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: var(--wash);
        font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
        line-height: 1.6;
      }

      .page {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .hero {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 22px;
        align-items: center;
        padding: 26px 0;
        border-bottom: 1px solid var(--line);
      }

      .avatar {
        width: 96px;
        height: 124px;
        object-fit: cover;
        border: 1px solid var(--line);
        background: var(--paper);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 46px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 15px;
        border: 1px solid var(--brand);
        border-radius: 6px;
        color: var(--brand);
        background: var(--paper);
        text-decoration: none;
        font-weight: 700;
      }

      .button.primary {
        color: #fff;
        background: var(--brand);
      }

      .button:hover {
        border-color: var(--brand-dark);
        color: var(--brand-dark);
      }

      .button.primary:hover {
        color: #fff;
        background: var(--brand-dark);
      }

      .viewer {
        margin-top: 24px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 18px 45px rgba(16, 44, 76, 0.08);
      }

      .viewer object,
      .viewer iframe {
        display: block;
        width: 100%;
        height: min(78vh, 900px);
        min-height: 620px;
        border: 0;
      }

      .fallback {
        padding: 24px;
        color: var(--muted);
      }

      @media (max-width: 760px) {
        .hero {
          grid-template-columns: auto 1fr;
        }

        .actions {
          grid-column: 1 / -1;
          justify-content: flex-start;
        }

        .viewer object,
        .viewer iframe {
          min-height: 520px;
          height: 72vh;
        }

        h1 {
          font-size: 32px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-label="简历标题">
        <img class="avatar" src="photo.jpg" alt="王子成证件照">
        <div>
          <h1>王子成</h1>
          <p class="subtitle">长沙理工大学 · 电气与信息工程学院 · 学术简历</p>
        </div>
        <nav class="actions" aria-label="简历操作">
          <a class="button primary" href="wang-zicheng-academic-resume.pdf">打开 PDF</a>
          <a class="button" href="wang-zicheng-academic-resume.pdf" download>下载简历</a>
          <a class="button" href="https://github.com/wzgig/Resume">GitHub</a>
        </nav>
      </section>

      <section class="viewer" aria-label="PDF 预览">
        <object data="wang-zicheng-academic-resume.pdf" type="application/pdf">
          <iframe src="wang-zicheng-academic-resume.pdf" title="王子成学术简历 PDF"></iframe>
          <p class="fallback">当前浏览器无法内嵌预览 PDF，请使用上方按钮打开或下载简历。</p>
        </object>
      </section>
    </main>
  </body>
</html>
